name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt / clippy / build / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      # --release uses fat LTO + codegen-units=1 (see [profile.release] in
      # Cargo.toml), so this also validates the fully optimized artifact.
      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo test --locked

  audit:
    name: cargo audit / deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: cargo audit
        run: cargo audit --deny warnings

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: cargo deny
        run: cargo deny check --ignore-rust-version || cargo deny check
